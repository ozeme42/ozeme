                        title: "5. Emeğin ve Helal Kazancın Değeri",
                        lesson: ["'Hiç kimse elinin emeğiyle kazandığından daha hayırlı bir yemek yememiştir.'", "İslam'da alın teri, dürüstçe çalışmak ve helal kazanç çok değerlidir.", "Tembellik ve haksız kazanç yolları kınanır."],
                        activity: { type: "multi_select", question: "Helal kazanç ile ilgili doğru sonuçları işaretleyiniz.", options: [{ id: 1, text: "Kendi elinin emeğiyle geçinmeye çalışılmalıdır.", isCorrect: true }, { id: 2, text: "Çalışmadan yaşamak daha iyidir.", isCorrect: false }, { id: 3, text: "Tembellik dinimizce kınanmıştır.", isCorrect: true }] }
                    },
                    {
                        title: "6. Tabiatın Korunması",
                        lesson: ["Çöpleri doğaya atmamak ve atıkları geri dönüşüme atmak.", "Ağaç dikmek ve suyu/elektriği israf etmemek.", "Sokak hayvanlarının yaşam haklarına saygı duymak.", "Plastik poşet yerine bez çanta kullanmak."],
                        activity: { type: "true_false", question: "Çevreyi korumakla ilgili davranışları değerlendiriniz.", statements: [{ id: 1, text: "Atık pilleri geri dönüşüme atmalıyız.", isTrue: true }, { id: 2, text: "Sokak hayvanları için kapıya su bırakmalıyız.", isTrue: true }, { id: 3, text: "Ormanlık alanlarda serbestçe ateş yakabiliriz.", isTrue: false }] }
                    }
                ]
            }
        ];

        // --- DEVLET YÖNETİMİ (STATE) ---
        let state = {
            currentCourseId: null, // null = Anasayfa
            currentTopicIdx: 0,
            viewMode: 'lesson',
            completedActivities: {}, // Örn: { "sinif_5_din": { 0: true, 1: true } }
            sidebarOpen: false,
            // Aktivite durumları
            actSelected: [], actAnswers: {}, actSelections: {}, actIsSubmitted: false, actFeedback: null
        };

        // İlerleme verilerini başlat
        coursesData.forEach(c => {
            if (!state.completedActivities[c.id]) state.completedActivities[c.id] = {};
        });

        // --- RENDER FONKSİYONLARI ---
        function init() {
            renderApp();
        }

        function renderApp() {
            const root = document.getElementById('app-root');
            if (state.currentCourseId === null) {
                root.innerHTML = renderDashboard();
            } else {
                root.innerHTML = renderCourseView();
                bindCourseEvents();
            }
        }

        // --- 1. ANA SAYFA (DASHBOARD) ---
        function renderDashboard() {
            let cardsHtml = '';
            
            coursesData.forEach(course => {
                const totalTopics = course.topics.length;
                const completed = Object.keys(state.completedActivities[course.id]).length;
                const progress = Math.round((completed / totalTopics) * 100) || 0;
                
                cardsHtml += `
                    <div onclick="openCourse('${course.id}')" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden cursor-pointer transform transition-all duration-300 hover:-translate-y-2 hover:shadow-xl group">
                        <div class="h-32 ${course.theme.main} flex items-center justify-center relative overflow-hidden">
                            <i class="fa-solid ${course.icon} text-white/20 text-6xl absolute -right-4 -bottom-4 transform group-hover:scale-110 transition-transform"></i>
                            <div class="w-16 h-16 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center shadow-inner z-10">
                                <i class="fa-solid ${course.icon} text-white text-3xl"></i>
                            </div>
                        </div>
                        <div class="p-6">
                            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">${course.grade}</div>
                            <h3 class="text-xl font-bold text-slate-800 mb-1 group-hover:${course.theme.text} transition-colors">${course.title}</h3>
                            <p class="text-slate-500 text-sm h-10 line-clamp-2">${course.subtitle}</p>
                            
                            <div class="mt-6">
                                <div class="flex justify-between text-xs font-bold text-slate-500 mb-2">
                                    <span>İlerleme</span>
                                    <span>%${progress}</span>
                                </div>
                                <div class="w-full bg-slate-100 rounded-full h-2.5 shadow-inner">
                                    <div class="${course.theme.main} h-2.5 rounded-full transition-all duration-1000" style="width: ${progress}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            return `
                <header class="bg-slate-900 text-white p-6 shadow-md z-20">
                    <div class="max-w-6xl mx-auto flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg transform rotate-3">
                            <i class="fa-solid fa-graduation-cap text-2xl text-white transform -rotate-3"></i>
                        </div>
                        <div>
                            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight">Eğitim Portalı</h1>
                            <p class="text-slate-400 text-sm font-medium">İnteraktif Konu Özetleri ve Etkinlikler</p>
                        </div>
                    </div>
                </header>
                <main class="flex-1 overflow-y-auto p-6 md:p-10 bg-slate-50">
                    <div class="max-w-6xl mx-auto animate-fadeIn">
                        <h2 class="text-xl font-bold text-slate-700 mb-6 flex items-center gap-2">
                            <i class="fa-solid fa-layer-group text-slate-400"></i> Mevcut Dersler
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            ${cardsHtml}
                        </div>
                    </div>
                </main>
            `;
        }

        window.openCourse = (courseId) => {
            state.currentCourseId = courseId;
            state.currentTopicIdx = 0;
            state.viewMode = 'lesson';
            resetActivityState();
            renderApp();
        };

        window.goHome = () => {
            state.currentCourseId = null;
            renderApp();
        };

        // --- 2. DERS İÇERİĞİ GÖRÜNÜMÜ ---
        function renderCourseView() {
            const course = coursesData.find(c => c.id === state.currentCourseId);
            const topic = course.topics[state.currentTopicIdx];
            
            const totalTopics = course.topics.length;
            const completed = Object.keys(state.completedActivities[course.id]).length;
            const progress = Math.round((completed / totalTopics) * 100) || 0;

            const isCompleted = state.completedActivities[course.id][state.currentTopicIdx];

            return `
                <!-- HEADER -->
                <header class="${course.theme.main} text-white p-4 shadow-md z-20 flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-3">
                        <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-white/10 rounded-lg hover:bg-white/20 transition-colors">
                            <i class="fa-solid fa-bars text-xl"></i>
                        </button>
                        <button onclick="goHome()" class="p-2 bg-white/10 rounded-lg hover:bg-white/20 transition-colors flex items-center gap-2 font-bold px-4 hidden sm:flex">
                            <i class="fa-solid fa-arrow-left"></i> Portala Dön
                        </button>
                        <button onclick="goHome()" class="p-2 bg-white/10 rounded-lg hover:bg-white/20 transition-colors sm:hidden">
                            <i class="fa-solid fa-house"></i>
                        </button>
                        <div class="h-8 w-px bg-white/20 mx-2 hidden sm:block"></div>
                        <div>
                            <h1 class="text-lg md:text-xl font-bold leading-tight">${course.grade} ${course.title}</h1>
                            <p class="text-white/70 text-xs hidden md:block">${course.subtitle}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 bg-black/10 px-4 py-2 rounded-lg border border-white/10 shadow-inner">
                        <i class="fa-solid fa-star text-yellow-300 text-xl"></i>
                        <span class="font-bold hidden sm:inline">İlerleme: %${progress}</span>
                        <span class="font-bold sm:hidden">%${progress}</span>
                    </div>
                </header>

                <div class="flex flex-1 overflow-hidden relative bg-slate-50">
                    
                    <!-- SIDEBAR -->
                    <aside id="sidebar" class="-translate-x-full lg:translate-x-0 absolute lg:relative z-30 w-80 bg-white border-r border-slate-200 h-full transition-transform duration-300 ease-in-out shadow-2xl lg:shadow-none overflow-y-auto shrink-0 flex flex-col">
                        <div class="p-4 flex justify-between items-center lg:hidden border-b border-slate-100">
                            <span class="font-bold text-slate-700">Konular</span>
                            <button onclick="toggleSidebar()"><i class="fa-solid fa-xmark text-xl text-slate-400"></i></button>
                        </div>
                        <div class="p-4 flex-1">
                            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 hidden lg:block">Ders İçeriği</h2>
                            <nav class="space-y-1" id="sidebar-nav">
                                ${renderSidebarNav(course)}
                            </nav>
                        </div>
                    </aside>

                    <!-- MAIN CONTENT AREA -->
                    <main class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col w-full ${course.theme.bgLight} relative">
                        <div id="sidebar-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-slate-900/50 z-20 lg:hidden backdrop-blur-sm transition-opacity"></div>

                        <div class="max-w-4xl mx-auto w-full flex-1 flex flex-col z-10">
                            
                            <div class="mb-6 animate-fadeIn">
                                <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800 border-b-2 ${course.theme.border} pb-4">
                                    ${topic.title.replace(/^\d+\.\s*/, '')}
                                </h2>
                            </div>

                            <!-- Tabs -->
                            <div class="flex bg-white/60 p-1 rounded-xl mb-8 shrink-0 shadow-inner border border-slate-200/50">
                                <button onclick="setView('lesson')" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-lg font-bold transition-all ${state.viewMode === 'lesson' ? 'bg-white ' + course.theme.text + ' shadow-sm border border-slate-200 transform scale-[1.01]' : 'text-slate-500 hover:bg-white/50 border border-transparent'}">
                                    <i class="fa-solid fa-book-open"></i> Konu Özeti
                                </button>
                                <button onclick="setView('activity')" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-lg font-bold transition-all relative ${state.viewMode === 'activity' ? 'bg-white ' + course.theme.text + ' shadow-sm border border-slate-200 transform scale-[1.01]' : 'text-slate-500 hover:bg-white/50 border border-transparent'}">
                                    <i class="fa-solid fa-puzzle-piece"></i> Etkinlikle Pekiştir
                                    <i class="fa-solid fa-circle-check text-green-500 absolute right-4 ${isCompleted ? '' : 'hidden'}"></i>
                                </button>
                            </div>

                            <!-- View Content -->
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 flex-1 mb-8 relative overflow-hidden">
                                <!-- Dekoratif arka plan simgesi -->
                                <i class="fa-solid ${course.icon} absolute -bottom-10 -right-10 text-9xl text-slate-50 opacity-50 pointer-events-none"></i>
                                
                                <div class="relative z-10">
                                    ${state.viewMode === 'lesson' ? renderLessonHTML(topic, course.theme) : renderActivityHTML(topic.activity, course.theme)}
                                </div>
                            </div>

                            <!-- Bottom Navigation -->
                            <div class="flex justify-between items-center pb-8 mt-auto shrink-0">
                                <button onclick="prevTopic()" ${state.currentTopicIdx === 0 ? 'disabled' : ''} class="flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-sm">
                                    <i class="fa-solid fa-chevron-left"></i> Önceki
                                </button>
                                
                                <span class="${course.theme.text} font-bold hidden md:block tracking-wide bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm">
                                    Konu ${state.currentTopicIdx + 1} / ${course.topics.length}
                                </span>

                                <button onclick="nextTopic()" ${state.currentTopicIdx === course.topics.length - 1 ? 'disabled' : ''} class="flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-white ${course.theme.main} ${course.theme.hover} disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md hover:shadow-lg">
                                    Sonraki <i class="fa-solid fa-chevron-right"></i>
                                </button>
                            </div>

                        </div>
                    </main>
                </div>
            `;
        }

        function renderSidebarNav(course) {
            let html = '';
            course.topics.forEach((topic, idx) => {
                const isActive = state.currentTopicIdx === idx;
                const isCompleted = state.completedActivities[course.id][idx];
                
                const activeClasses = isActive ? `${course.theme.bgLight} ${course.theme.textDark} font-bold border-l-4 ${course.theme.borderStrong} shadow-sm` : 'text-slate-600 hover:bg-slate-50 border-l-4 border-transparent';
                const iconClasses = isCompleted ? 'bg-green-500 border-green-500 text-white shadow-sm' : 'border-slate-200 text-slate-400 font-bold bg-slate-50';
                const iconContent = isCompleted ? '<i class="fa-solid fa-check text-xs"></i>' : (idx + 1);
                
                const shortTitle = topic.title.replace(/^\d+\.\s*/, '');

                html += `
                <button onclick="setTopic(${idx})" class="w-full text-left p-3 rounded-r-xl flex items-center gap-3 transition-all ${activeClasses} mb-1">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 border-2 ${iconClasses}">
                        ${iconContent}
                    </div>
                    <span class="text-sm leading-snug line-clamp-2">${shortTitle}</span>
                </button>
                `;
            });
            return html;
        }

        function renderLessonHTML(topic, theme) {
            let listHtml = `<div class="font-bold ${theme.textDark} mb-6 flex items-center gap-3 text-xl border-b-2 border-slate-100 pb-3"><i class="fa-solid fa-book-open-reader ${theme.text}"></i> Konu Özeti</div>`;

            topic.lesson.forEach(item => {
                let formattedItem = item.replace(/^(\d+\.)\s/g, `<span class="font-extrabold ${theme.text} mr-1">$1</span> `);
                listHtml += `
                    <li class="flex items-start gap-3 text-slate-700 text-lg mb-4 bg-slate-50/50 p-4 rounded-xl border border-slate-100 shadow-sm transition-transform hover:translate-x-1">
                        <span class="w-2.5 h-2.5 mt-2.5 rounded-full ${theme.main} shrink-0 shadow-sm opacity-80"></span>
                        <span class="leading-relaxed">${formattedItem}</span>
                    </li>`;
            });

            return `
                <div class="space-y-4 animate-fadeIn">
                    <ul class="space-y-3">${listHtml}</ul>
                    <div class="mt-10 flex justify-end">
                        <button onclick="setView('activity')" class="${theme.main} ${theme.hover} text-white px-7 py-3 rounded-xl font-bold shadow-md hover:shadow-lg flex items-center gap-2 transition-all transform hover:-translate-y-1">
                            <i class="fa-solid fa-puzzle-piece text-xl"></i> Etkinliğe Geç
                        </button>
                    </div>
                </div>
            `;
        }

        function renderActivityHTML(act, theme) {
            let contentHtml = '';

            // 1. Çoktan Seçmeli
            if (act.type === 'multi_select') {
                let optionsHtml = '';
                act.options.forEach(opt => {
                    const isSelected = state.actSelected.includes(opt.id);
                    let classes = "border-slate-200 hover:border-slate-300 hover:bg-slate-50 bg-white";
                    let iconClasses = "border-slate-300 bg-slate-50 text-transparent";
                    let iconHtml = '<i class="fa-solid fa-check text-xs"></i>';
                    let extraInfo = ""; let textClasses = "text-slate-700";

                    if (state.actIsSubmitted) {
                        if (opt.isCorrect) {
                            classes = "border-green-500 bg-green-50"; textClasses = "text-green-800 font-bold";
                            if (!isSelected) extraInfo = '<span class="ml-auto text-sm text-green-700 font-bold bg-green-200 px-2 py-1 rounded-md">Doğru cevap buydu!</span>';
                        } else if (isSelected) {
                            classes = "border-red-500 bg-red-50"; extraInfo = '<span class="ml-auto text-sm text-red-600 font-bold bg-red-200 px-2 py-1 rounded-md">Yanlış seçim!</span>';
                        } else {
                            classes = "border-slate-200 bg-slate-50 opacity-50";
                        }
                        if(isSelected) {
                            iconClasses = opt.isCorrect ? "bg-green-500 border-green-500 text-white" : "bg-red-500 border-red-500 text-white";
                            iconHtml = opt.isCorrect ? '<i class="fa-solid fa-check text-xs"></i>' : '<i class="fa-solid fa-xmark text-xs"></i>';
                        }
                    } else if (isSelected) {
                        classes = `${theme.borderStrong} ${theme.bgLight} shadow-md transform scale-[1.01]`;
                        iconClasses = `${theme.main} border-transparent text-white shadow-inner`;
                    }

                    optionsHtml += `
                        <div onclick="toggleMultiSelect(${opt.id})" class="p-4 rounded-xl border-2 cursor-pointer transition-all duration-200 flex items-center gap-4 ${classes}">
                            <div class="w-7 h-7 rounded-lg border-2 flex items-center justify-center transition-colors ${iconClasses}">${iconHtml}</div>
                            <span class="text-lg ${textClasses}">${opt.text}</span>${extraInfo}
                        </div>`;
                });

                const btnDisabled = state.actSelected.length === 0;
                const actionBtn = state.actIsSubmitted 
                    ? `<button onclick="resetActivity()" class="px-7 py-3 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold rounded-xl transition-colors shadow-sm"><i class="fa-solid fa-rotate-right mr-2"></i>Tekrar Dene</button>`
                    : `<button onclick="checkMultiSelect()" ${btnDisabled ? 'disabled' : ''} class="px-7 py-3 ${theme.main} ${theme.hover} text-white font-bold rounded-xl shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed transform ${!btnDisabled && 'hover:-translate-y-1 hover:shadow-lg'}">Kontrol Et</button>`;

                contentHtml = `
                    <div class="space-y-6 animate-fadeIn">
                        <div class="flex items-start gap-4 mb-6 ${theme.bgLight} p-4 rounded-xl border ${theme.border}">
                            <div class="bg-white p-2 rounded-lg shadow-sm ${theme.text}"><i class="fa-solid fa-list-check text-2xl"></i></div>
                            <h3 class="text-lg font-bold text-slate-800 mt-1">${act.question}</h3>
                        </div>
                        <div class="space-y-3">${optionsHtml}</div>
                        ${renderFeedback()}
                        <div class="flex gap-4 pt-4">${actionBtn}</div>
                    </div>`;
            } 
            
            // 2. Doğru/Yanlış
            else if (act.type === 'true_false') {
                let statementsHtml = '';
                act.statements.forEach(stmt => {
                    const ans = state.actAnswers[stmt.id];
                    const isCorrectAnswer = ans === stmt.isTrue;
                    let rowClasses = "border-slate-200 bg-white hover:border-slate-300 shadow-sm";
                    
                    if (state.actIsSubmitted) {
                        rowClasses = isCorrectAnswer ? "border-green-500 bg-green-50 shadow-none" : "border-red-500 bg-red-50 shadow-none";
                    }

                    const getBtnClass = (btnType) => {
                        if (ans === btnType) {
                            if (state.actIsSubmitted) return stmt.isTrue === btnType ? "bg-green-500 border-green-500 text-white shadow-inner" : "bg-red-500 border-red-500 text-white shadow-inner";
                            return `${theme.main} border-transparent text-white shadow-inner`;
                        }
                        return `border-slate-200 text-slate-400 hover:border-slate-400 hover:${theme.text} bg-slate-50 hover:bg-white`;
                    };

                    statementsHtml += `
                        <div class="p-5 rounded-xl border-2 flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between transition-all ${rowClasses}">
                            <span class="text-lg text-slate-700 flex-1 font-medium">${stmt.text}</span>
                            <div class="flex gap-2 shrink-0 bg-slate-100 p-1 rounded-xl">
                                <button onclick="setTrueFalse(${stmt.id}, true)" class="px-5 py-2 rounded-lg font-bold border-2 transition-all ${getBtnClass(true)}"><i class="fa-solid fa-check mr-1"></i> D</button>
                                <button onclick="setTrueFalse(${stmt.id}, false)" class="px-5 py-2 rounded-lg font-bold border-2 transition-all ${getBtnClass(false)}"><i class="fa-solid fa-xmark mr-1"></i> Y</button>
                            </div>
                        </div>`;
                });

                const allAnswered = Object.keys(state.actAnswers).length === act.statements.length;
                const actionBtn = state.actIsSubmitted 
                    ? `<button onclick="resetActivity()" class="px-7 py-3 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold rounded-xl transition-colors shadow-sm"><i class="fa-solid fa-rotate-right mr-2"></i>Tekrar Dene</button>`
                    : `<button onclick="checkTrueFalse()" ${!allAnswered ? 'disabled' : ''} class="px-7 py-3 ${theme.main} ${theme.hover} text-white font-bold rounded-xl shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed transform ${allAnswered && 'hover:-translate-y-1 hover:shadow-lg'}">Kontrol Et</button>`;

                contentHtml = `
                    <div class="space-y-6 animate-fadeIn">
                        <div class="flex items-start gap-4 mb-6 ${theme.bgLight} p-4 rounded-xl border ${theme.border}">
                            <div class="bg-white p-2 rounded-lg shadow-sm ${theme.text}"><i class="fa-solid fa-scale-balanced text-2xl"></i></div>
                            <h3 class="text-lg font-bold text-slate-800 mt-1">${act.question}</h3>
                        </div>
                        <div class="space-y-4">${statementsHtml}</div>
                        ${renderFeedback()}
                        <div class="flex gap-4 pt-4">${actionBtn}</div>
                    </div>`;
            }

            // 3. Eşleştirme
            else if (act.type === 'match') {
                let itemsHtml = '';
                act.items.forEach(item => {
                    const sel = state.actSelections[item.id];
                    const isCorrect = sel === item.matchId;
                    
                    let rowClasses = "border-slate-200 bg-white hover:border-slate-300 shadow-sm";
                    let selectClasses = "border-slate-200 focus:border-slate-400 bg-slate-50 hover:bg-white text-slate-700";
                    
                    if (state.actIsSubmitted) {
                        rowClasses = isCorrect ? "border-green-500 bg-green-50 shadow-none" : "border-red-500 bg-red-50 shadow-none";
                        selectClasses = isCorrect ? "border-green-500 text-green-800 bg-green-100 font-bold" : "border-red-500 text-red-800 bg-red-100 font-bold";
                    } else if (sel) {
                        selectClasses = `${theme.borderStrong} ${theme.bgLight} ${theme.textDark} font-bold`;
                    }

                    let optionsHtml = `<option value="" disabled ${!sel ? 'selected' : ''}>Kavramı Seçin...</option>`;
                    act.dropdownOptions.forEach(opt => {
                        optionsHtml += `<option value="${opt.id}" ${sel === opt.id ? 'selected' : ''}>${opt.label}</option>`;
                    });

                    itemsHtml += `
                        <div class="p-5 rounded-xl border-2 flex flex-col lg:flex-row gap-4 lg:items-center justify-between transition-all ${rowClasses}">
                            <span class="text-lg text-slate-700 flex-1 font-medium"><i class="fa-solid fa-caret-right ${theme.text} opacity-50 mr-2"></i>${item.text}</span>
                            <div class="relative shrink-0 w-full lg:w-64">
                                <select onchange="setMatch(${item.id}, this.value)" ${state.actIsSubmitted ? 'disabled' : ''} class="appearance-none w-full p-3 pr-10 rounded-xl border-2 outline-none cursor-pointer transition-all ${selectClasses}">
                                    ${optionsHtml}
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-slate-400"><i class="fa-solid fa-chevron-down"></i></div>
                            </div>
                        </div>`;
                });

                const allAnswered = Object.keys(state.actSelections).length === act.items.length;
                const actionBtn = state.actIsSubmitted 
                    ? `<button onclick="resetActivity()" class="px-7 py-3 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold rounded-xl transition-colors shadow-sm"><i class="fa-solid fa-rotate-right mr-2"></i>Tekrar Dene</button>`
                    : `<button onclick="checkMatch()" ${!allAnswered ? 'disabled' : ''} class="px-7 py-3 ${theme.main} ${theme.hover} text-white font-bold rounded-xl shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed transform ${allAnswered && 'hover:-translate-y-1 hover:shadow-lg'}">Kontrol Et</button>`;

                contentHtml = `
                    <div class="space-y-6 animate-fadeIn">
                        <div class="flex items-start gap-4 mb-6 ${theme.bgLight} p-4 rounded-xl border ${theme.border}">
                            <div class="bg-white p-2 rounded-lg shadow-sm ${theme.text}"><i class="fa-solid fa-link text-2xl"></i></div>
                            <h3 class="text-lg font-bold text-slate-800 mt-1">${act.question}</h3>
                        </div>
                        <div class="space-y-4">${itemsHtml}</div>
                        ${renderFeedback()}
                        <div class="flex gap-4 pt-4">${actionBtn}</div>
                    </div>`;
            }

            return contentHtml;
        }

        function renderFeedback() {
            if (!state.actFeedback) return '';
            const isSuccess = state.actFeedback.type === 'success';
            const bgClass = isSuccess ? 'bg-green-100 text-green-800 border-2 border-green-400' : 'bg-red-100 text-red-800 border-2 border-red-400';
            const icon = isSuccess ? '<i class="fa-solid fa-circle-check text-3xl"></i>' : '<i class="fa-solid fa-circle-xmark text-3xl"></i>';
            return `
                <div class="p-5 rounded-2xl flex items-center gap-4 mt-6 transform animate-fadeIn shadow-sm ${bgClass}">
                    ${icon} <span class="font-extrabold text-xl tracking-wide">${state.actFeedback.text}</span>
                </div>`;
        }

        function bindCourseEvents() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if(state.sidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // --- ETKİLEŞİM FONKSİYONLARI ---
        window.toggleSidebar = () => { state.sidebarOpen = !state.sidebarOpen; renderApp(); };
        window.setTopic = (idx) => { state.currentTopicIdx = idx; state.viewMode = 'lesson'; state.sidebarOpen = false; resetActivityState(); renderApp(); window.scrollTo(0,0); };
        window.setView = (mode) => { state.viewMode = mode; renderApp(); };
        window.nextTopic = () => { const len = coursesData.find(c=>c.id===state.currentCourseId).topics.length; if(state.currentTopicIdx < len-1) setTopic(state.currentTopicIdx+1); };
        window.prevTopic = () => { if(state.currentTopicIdx > 0) setTopic(state.currentTopicIdx-1); };

        function resetActivityState() {
            state.actSelected = []; state.actAnswers = {}; state.actSelections = {}; state.actIsSubmitted = false; state.actFeedback = null;
        }
        window.resetActivity = () => { resetActivityState(); renderApp(); };

        window.toggleMultiSelect = (id) => {
            if (state.actIsSubmitted) return;
            if (state.actSelected.includes(id)) state.actSelected = state.actSelected.filter(i => i !== id);
            else state.actSelected.push(id);
            renderApp();
        };

        window.checkMultiSelect = () => {
            state.actIsSubmitted = true; let allCorrect = true;
            const act = coursesData.find(c=>c.id===state.currentCourseId).topics[state.currentTopicIdx].activity;
            act.options.forEach(opt => {
                const isSelected = state.actSelected.includes(opt.id);
                if (opt.isCorrect && !isSelected) allCorrect = false;
                if (!opt.isCorrect && isSelected) allCorrect = false;
            });
            handleResult(allCorrect, 'Tebrikler! Tüm doğruları eksiksiz buldunuz.', 'Bazı seçimleriniz hatalı veya eksik.');
        };

        window.setTrueFalse = (id, val) => { if (state.actIsSubmitted) return; state.actAnswers[id] = val; renderApp(); };

        window.checkTrueFalse = () => {
            state.actIsSubmitted = true; let allCorrect = true;
            const act = coursesData.find(c=>c.id===state.currentCourseId).topics[state.currentTopicIdx].activity;
            act.statements.forEach(stmt => { if (state.actAnswers[stmt.id] !== stmt.isTrue) allCorrect = false; });
            handleResult(allCorrect, 'Harika! İfadelere doğru cevap verdiniz.', 'Cevaplarınızda hata var. Kırmızı işaretli olanları inceleyin.');
        };

        window.setMatch = (id, val) => { if (state.actIsSubmitted) return; state.actSelections[id] = val; renderApp(); };

        window.checkMatch = () => {
            state.actIsSubmitted = true; let allCorrect = true;
            const act = coursesData.find(c=>c.id===state.currentCourseId).topics[state.currentTopicIdx].activity;
            act.items.forEach(item => { if (state.actSelections[item.id] !== item.matchId) allCorrect = false; });
            handleResult(allCorrect, 'Mükemmel! Tüm eşleştirmeler doğru.', 'Bazı kavramları yanlış eşleştirdiniz.');
        };

        function handleResult(isSuccess, successMsg, errorMsg) {
            if (isSuccess) {
                state.actFeedback = { type: 'success', text: successMsg };
                state.completedActivities[state.currentCourseId][state.currentTopicIdx] = true;
            } else {
                state.actFeedback = { type: 'error', text: errorMsg };
            }
            renderApp();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
